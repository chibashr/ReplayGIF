# ReplayGif — Output profiles
# Each profile is a name and a list of one or more output targets.
# Triggers reference profile names; all targets in the profile execute.
# Every profile name referenced in triggers.yml must exist here.

# Example: default profile with no targets (add Discord/Filesystem/Generic as needed).
profiles:
  default: []
  # Example Discord webhook (uncomment and set url):
  # discord_example:
  #   - type: discord_webhook
  #     url: "https://discord.com/api/webhooks/..."
  # Example filesystem (path must be inside plugin directory):
  # filesystem_example:
  #   - type: filesystem
  #     path_template: "gifs/{world}/{player}_{timestamp}.gif"
  # Example generic webhook:
  # generic_example:
  #   - type: generic_webhook
  #     url: "https://example.com/webhook"
  #     headers: {}
