# Full config for CFG-001
sidecar_max_heap_mb: 256
max_queue_size: 5

triggers:
  player_death:
    event: PlayerDeathEvent
    enabled: true
    pre_seconds: 5
    post_seconds: 2
    radius_chunks: 5
    capture_rate_ticks: 2
    fps: 10
    pixels_per_block: 32
    cooldown:
      per_player_seconds: 30
      global_seconds: 60
    destinations:
      - type: disk
      - type: in_game
  block_break:
    event: BlockBreakEvent
    enabled: true
    pre_seconds: 3
    post_seconds: 1
    radius_chunks: 4
    capture_rate_ticks: 4
    fps: 15
    pixels_per_block: 24
    cooldown:
      per_player_seconds: 10
      global_seconds: 0
    destinations:
      - type: disk
